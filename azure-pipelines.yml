trigger:
- main

pool:
  name: "Default"

variables:
  ArtifactName: "drop"
  DeployPath: "$(Pipeline.Workspace)/deploy/grupo03" 

stages:
- stage: Build
  displayName: Build + Evidencias
  jobs:
  - job: BuildJob
    displayName: BuildJob
    steps:
    - checkout: self

    - script: |
        echo "== Evidencia de agente/máquina =="
        echo "Agent.Name=$(Agent.Name)"
        echo "Agent.MachineName=$(Agent.MachineName)"
        echo "Agent.OS=$(Agent.OS)"
        uname -a || true
      displayName: "Evidencia: agente"

    - script: |
        echo "== Build (simple) =="
        mkdir -p artifact
        {
          echo "REPORTE PIPELINE"
          echo "---------------"
          echo "BuildId: $(Build.BuildId)"
          echo "Commit : $(Build.SourceVersion)"
          echo "Branch : $(Build.SourceBranch)"
          echo "Fecha  : $(Build.QueuedTime)"
        } > artifact/build_info.txt

        echo "Contenido artifact:"
        ls -la artifact
        cat artifact/build_info.txt
      displayName: "Build: generar artefacto"

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.SourcesDirectory)/artifact'
        ArtifactName: '$(ArtifactName)'
      displayName: "Publicar artefacto"

- stage: Deploy
  displayName: Deploy (local, sin permisos extra)
  dependsOn: Build
  jobs:
  - deployment: DeployJob
    displayName: Deploy usando Environment
    environment: 'env-grupo03-vm'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: $(ArtifactName)

          - script: |
              echo "== Deploy REAL local =="
              echo "Destino: $(DeployPath)"
              mkdir -p "$(DeployPath)"

              echo "Copiando artefacto..."
              cp -r "$(Pipeline.Workspace)/$(ArtifactName)/"* "$(DeployPath)/"

              echo "Verificando contenido destino:"
              ls -la "$(DeployPath)"

              echo "Mostrando build_info:"
              cat "$(DeployPath)/build_info.txt"
            displayName: "Deploy: copiar + verificar"
